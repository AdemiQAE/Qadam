<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Байланыс - Qadam</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <button id="sidebar-toggle" class="icon-btn">☰</button>
            <div class="logo-text"><a href="index.html">Qadam</a></div>
        </div>
        <div class="header-right">
            <select id="language-switch" class="lang-select">
                <option value="kk">ҚАЗ</option>
                <option value="ru">РУС</option>
                <option value="en">ENG</option>
            </select>
            <label class="theme-switch" for="theme-checkbox">
                <input type="checkbox" id="theme-checkbox" onchange="window.toggleTheme()" />
                <div class="slider round">
                    <span class="icon sun">☀️</span>
                    <span class="icon moon">🌙</span>
                </div>
            </label>
            <div class="auth-nav" style="display:flex; align-items:center; gap:10px;"></div>
        </div>
    </header>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo-text"><a href="index.html">Qadam</a></div>
            <div style="display:flex; gap:5px;">
                <button id="sidebar-position-btn" class="icon-btn" title="Оңға/Солға" style="width:30px; height:30px; font-size:1rem;">⇋</button>
                <button id="sidebar-close" class="icon-btn" style="width:30px; height:30px; font-size:1rem;">×</button>
            </div>
        </div>
        <div class="sidebar-menu">
            <a href="index.html" data-i18n="menu-home">Басты бет</a>
            <a href="about.html" data-i18n="menu-about">Біз туралы</a>
            <a href="services.html" data-i18n="menu-services">Қызметтер</a>
            <a href="blog.html" data-i18n="menu-blog">Блог</a>
            <a href="contact.html" class="active" data-i18n="menu-contact">Байланыс</a>
        </div>
    </nav>

    <main class="contact-section">
        <h2 style="text-align: center;" data-i18n="contact-title">Бізбен байланысу</h2>
        <p id="form-message" style="text-align:center; margin-bottom: 15px; font-weight:bold;"></p>
        <form id="contact-form" action="#" method="POST">
            <label for="name" data-i18n="contact-label-name">Аты-жөніңіз:</label>
            <input type="text" id="name" name="name" data-i18n="contact-ph-name" placeholder="Өз атыңызды жазыңыз" required minlength="2">

            <label for="email" data-i18n="contact-label-email">Email адресіңіз:</label>
            <input type="email" id="email" name="email" data-i18n="contact-ph-email" placeholder="example@mail.com" required>

            <label for="message" data-i18n="contact-label-msg">Хабарламаңыз:</label>
            <textarea id="message" name="message" data-i18n="contact-ph-msg" rows="5" placeholder="Хабарламаңызды осында қалдырыңыз" required minlength="10"></textarea>

            <button type="submit" class="btn" data-i18n="contact-btn">Жіберу</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Qadam Online Courses. Барлық құқықтар қорғалған.</p>
    </footer>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }
    </script>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
