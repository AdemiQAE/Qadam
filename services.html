<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Қызметтер - Qadam</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <button id="sidebar-toggle" class="icon-btn">☰</button>
            <div class="logo-text"><a href="index.html">Qadam</a></div>
        </div>
        <div class="header-right">
            <select id="language-switch" class="lang-select">
                <option value="kk">ҚАЗ</option>
                <option value="ru">РУС</option>
                <option value="en">ENG</option>
            </select>
            <label class="theme-switch" for="theme-checkbox">
                <input type="checkbox" id="theme-checkbox" onchange="window.toggleTheme()" />
                <div class="slider round">
                    <span class="icon sun">☀️</span>
                    <span class="icon moon">🌙</span>
                </div>
            </label>
            <div class="auth-nav" style="display:flex; align-items:center; gap:10px;"></div>
        </div>
    </header>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo-text"><a href="index.html">Qadam</a></div>
            <div style="display:flex; gap:5px;">
                <button id="sidebar-position-btn" class="icon-btn" title="Оңға/Солға" style="width:30px; height:30px; font-size:1rem;">⇋</button>
                <button id="sidebar-close" class="icon-btn" style="width:30px; height:30px; font-size:1rem;">×</button>
            </div>
        </div>
        <div class="sidebar-menu">
            <a href="index.html" data-i18n="menu-home">Басты бет</a>
            <a href="about.html" data-i18n="menu-about">Біз туралы</a>
            <a href="services.html" class="active" data-i18n="menu-services">Қызметтер</a>
            <a href="blog.html" data-i18n="menu-blog">Блог</a>
            <a href="contact.html" data-i18n="menu-contact">Байланыс</a>
        </div>
    </nav>

    <main>
        <h2 style="text-align: center; margin-top: 40px;" data-i18n="services-title">Біздің Курстар (Қызметтер)</h2>

        <!-- Түсірмелі мәзір (Dropdown) -->
        <div style="max-width: 800px; margin: 20px auto; padding: 0 20px; text-align: center;">
            <label for="course-select" style="font-weight: bold; color: var(--text-main); font-size: 1.1rem;">Курсты таңдаңыз:</label>
            <select id="course-select" style="margin-left: 10px; padding: 8px 15px; border-radius: 5px; font-family: inherit; background-color: var(--bg-body); color: var(--text-main); border: 1px solid var(--border-color); font-size: 1rem;">
                <option value="frontend">Frontend Разработка</option>
                <option value="uxui">UX/UI Дизайн</option>
                <option value="python">Python Backend</option>
            </select>
        </div>

        <!-- Бағалар кестесі -->
        <div style="max-width: 800px; margin: 0 auto 40px auto; overflow-x: auto; padding: 0 20px;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; color: var(--text-main); background-color: var(--bg-body); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden;">
                <thead>
                    <tr style="background-color: var(--btn-color); color: #fff;">
                        <th style="padding: 15px; border: 1px solid var(--border-color);">№</th>
                        <th style="padding: 15px; border: 1px solid var(--border-color);">Курс атауы</th>
                        <th style="padding: 15px; border: 1px solid var(--border-color);">Ұзақтығы</th>
                        <th style="padding: 15px; border: 1px solid var(--border-color);">Бағасы (айына)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">1</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">Frontend Разработка</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">6 ай</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">40 000 ₸</td>
                    </tr>
                    <tr>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">2</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">UX/UI Дизайн</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">4 ай</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">35 000 ₸</td>
                    </tr>
                    <tr>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">3</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">Python Backend</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">7 ай</td>
                        <td style="padding: 15px; border: 1px solid var(--border-color);">45 000 ₸</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- React қосымшасы орналасатын орын (Практикалық жұмыс №4) -->
        <div id="react-root"></div>
    </main>

    <footer>
        <p>&copy; 2026 Qadam Online Courses. Барлық құқықтар қорғалған.</p>
    </footer>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }
    </script>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>

    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Біздің React компонентіміз -->
    <script type="text/babel" src="js/react-app.jsx"></script>
</body>
</html>
