<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кіру - Qadam</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <button id="sidebar-toggle" class="icon-btn">☰</button>
            <div class="logo-text"><a href="index.html">Qadam</a></div>
        </div>
        <div class="header-right">
            <select id="language-switch" class="lang-select">
                <option value="kk">ҚАЗ</option>
                <option value="ru">РУС</option>
                <option value="en">ENG</option>
            </select>
            <label class="theme-switch" for="theme-checkbox">
                <input type="checkbox" id="theme-checkbox" onchange="window.toggleTheme()" />
                <div class="slider round">
                    <span class="icon sun">☀️</span>
                    <span class="icon moon">🌙</span>
                </div>
            </label>
            <div class="auth-nav" style="display:flex; align-items:center; gap:10px;"></div>
        </div>
    </header>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo-text"><a href="index.html">Qadam</a></div>
            <div style="display:flex; gap:5px;">
                <button id="sidebar-position-btn" class="icon-btn" title="Оңға/Солға" style="width:30px; height:30px; font-size:1rem;">⇋</button>
                <button id="sidebar-close" class="icon-btn" style="width:30px; height:30px; font-size:1rem;">×</button>
            </div>
        </div>
        <div class="sidebar-menu">
            <a href="index.html" data-i18n="menu-home">Басты бет</a>
            <a href="about.html" data-i18n="menu-about">Біз туралы</a>
            <a href="services.html" data-i18n="menu-services">Қызметтер</a>
            <a href="blog.html" data-i18n="menu-blog">Блог</a>
            <a href="contact.html" data-i18n="menu-contact">Байланыс</a>
        </div>
    </nav>

    <main class="contact-section">
        <h2 style="text-align: center;" data-i18n="log-title">Жүйеге кіру</h2>
        <form id="login-form" action="#" method="POST" style="margin-top:20px;">
            <p id="login-error" style="text-align:center; margin-bottom:10px; font-weight:bold;"></p>

            <label for="login-email" data-i18n="contact-label-email">Email:</label>
            <input type="email" id="login-email" data-i18n="log-ph-email" placeholder="Тіркелген email">

            <label for="login-password" data-i18n="reg-label-pass">Құпиясөз:</label>
            <input type="password" id="login-password" data-i18n="log-ph-pass" placeholder="Құпиясөз">

            <button type="submit" class="btn" data-i18n="nav-login">Кіру</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Qadam Online Courses. Барлық құқықтар қорғалған.</p>
    </footer>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }
    </script>
    <!-- Javascript файлдарды қосу -->
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
